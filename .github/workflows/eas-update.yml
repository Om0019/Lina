name: EAS Update (OTA)

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: eas update --branch production --message "$(head -1 <<< "$COMMIT_MESSAGE")" --non-interactive
