<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Companion Prototype</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #16181d;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #eee;
    overflow: hidden;
    touch-action: manipulation;
  }
  #wrap {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; padding: 16px; gap: 14px;
  }
  #faceCanvas {
    background: #000;
    border-radius: 50%;
    box-shadow: 0 0 0 8px #2a2d35, 0 8px 30px rgba(0,0,0,0.5);
  }
  #status {
    font-size: 13px;
    color: #8a8f9a;
    min-height: 18px;
    text-align: center;
    max-width: 320px;
  }
  #transcript {
    font-size: 15px;
    color: #d7dae0;
    min-height: 22px;
    text-align: center;
    max-width: 340px;
  }
  #reply {
    font-size: 14px;
    color: #7fd1ff;
    text-align: center;
    max-width: 340px;
    min-height: 40px;
  }
  #micBtn {
    width: 74px; height: 74px; border-radius: 50%;
    border: none; background: #3a6df0; color: white;
    font-size: 28px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(58,109,240,0.5);
  }
  #micBtn.listening { background: #ef4b6b; box-shadow: 0 4px 14px rgba(239,75,107,0.5); }
  #micBtn:active { transform: scale(0.95); }
  #keyRow {
    display: flex; gap: 6px; align-items: center;
  }
  #apiKey {
    background: #21242c; border: 1px solid #333; color: #eee;
    padding: 6px 8px; border-radius: 6px; font-size: 12px; width: 180px;
  }
  #saveKeyBtn {
    background: #2a2d35; border: 1px solid #444; color: #ccc;
    padding: 6px 10px; border-radius: 6px; font-size: 12px;
  }
  #gyroBtn {
    background: none; border: 1px solid #444; color: #999;
    padding: 5px 10px; border-radius: 6px; font-size: 11px;
  }
  a { color: #7fd1ff; }
  #errBox {
    display: none;
    position: fixed; top: 0; left: 0; right: 0;
    background: #4b1414; color: #ffd6d6;
    font-size: 12px; padding: 10px; z-index: 999;
    white-space: pre-wrap;
  }
  #openHint {
    font-size: 12px; color: #666; text-align: center; max-width: 320px;
  }
</style>
</head>
<body>
<div id="errBox"></div>
<div id="wrap">
  <div id="openHint">If this looks blank, open it in Safari/Chrome directly (not inside an app preview) — mic and tilt need a real browser tab.</div>
  <canvas id="faceCanvas" width="260" height="260"></canvas>
  <div id="transcript"></div>
  <div id="reply"></div>
  <button id="micBtn">🎤</button>
  <div id="status">Tap the mic and talk. Face reacts to voice + tilt.</div>
  <div id="keyRow">
    <input id="apiKey" type="password" placeholder="OpenRouter API key">
    <button id="saveKeyBtn">Save</button>
    <button id="gyroBtn">Enable tilt</button>
  </div>
</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  const box = document.getElementById('errBox');
  box.style.display = 'block';
  box.textContent = 'Error: ' + msg + ' (line ' + line + ')';
  return false;
};

/* ---------------- FACE RENDERING ---------------- */
const canvas = document.getElementById('faceCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// expression state: 0=neutral,1=happy,2=curious,3=sleepy,4=surprised,5=talking
let expression = 'idle';
let blink = 0;          // 0..1, 1 = fully closed
let tiltX = 0, tiltY = 0; // from gyroscope, -1..1
let mouthOpen = 0;      // animated while "talking"
let talkTimer = null;
let lastBlinkTime = performance.now();
let nextBlinkDelay = 2500 + Math.random()*2500;

function scheduleBlink() {
  const now = performance.now();
  if (now - lastBlinkTime > nextBlinkDelay && expression !== 'sleepy') {
    lastBlinkTime = now;
    nextBlinkDelay = 2500 + Math.random()*3000;
    animateBlink();
  }
}

function animateBlink() {
  let start = performance.now();
  const dur = 220;
  function step(t) {
    const p = Math.min(1, (t-start)/dur);
    blink = p < 0.5 ? p*2 : (1-p)*2;
    if (p < 1) requestAnimationFrame(step); else blink = 0;
  }
  requestAnimationFrame(step);
}

function drawEye(cx, cy, r, closeAmt, dx, dy) {
  ctx.save();
  ctx.translate(cx + dx, cy + dy);
  const h = r * (1 - closeAmt*0.9);
  ctx.beginPath();
  ctx.ellipse(0, 0, r*0.62, Math.max(2, h), 0, 0, Math.PI*2);
  ctx.fillStyle = '#5fd0ff';
  ctx.shadowColor = '#5fd0ff';
  ctx.shadowBlur = 18;
  ctx.fill();
  ctx.restore();
}

function drawFace() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  const cx = W/2, cy = H/2 - 6;
  const eyeGap = 46;
  const baseR = 30;

  let closeAmt = blink;
  let eyeDX = tiltX * 10, eyeDY = tiltY * 8;
  let mouthCurve = 0;
  let mouthW = 46, mouthH = 14;
  let eyeR = baseR;
  let browEffect = 0;

  if (expression === 'happy') {
    mouthCurve = 1;
    eyeR = baseR * 0.9;
  } else if (expression === 'curious') {
    eyeR = baseR * 1.12;
    eyeDX += 6;
  } else if (expression === 'sleepy') {
    closeAmt = 0.75;
    mouthCurve = -0.1;
  } else if (expression === 'surprised') {
    eyeR = baseR * 1.25;
    mouthW = 26; mouthH = 26;
  } else if (expression === 'talking') {
    mouthH = 10 + mouthOpen * 22;
    mouthCurve = 0.4;
  } else {
    mouthCurve = 0.3;
  }

  drawEye(cx - eyeGap, cy, eyeR, closeAmt, eyeDX, eyeDY);
  drawEye(cx + eyeGap, cy, eyeR, closeAmt, eyeDX, eyeDY);

  // mouth
  ctx.save();
  ctx.translate(cx, cy + 62);
  ctx.beginPath();
  if (expression === 'surprised') {
    ctx.ellipse(0, 0, mouthW*0.5, mouthH*0.5, 0, 0, Math.PI*2);
  } else {
    const w = mouthW, h = mouthH;
    ctx.moveTo(-w/2, 0);
    ctx.quadraticCurveTo(0, h*mouthCurve*2, w/2, 0);
    ctx.lineTo(w/2, h*0.3);
    ctx.quadraticCurveTo(0, h*mouthCurve*2 + h*0.3, -w/2, h*0.3);
    ctx.closePath();
  }
  ctx.fillStyle = '#5fd0ff';
  ctx.shadowColor = '#5fd0ff';
  ctx.shadowBlur = 14;
  ctx.fill();
  ctx.restore();
}

function loop(t) {
  scheduleBlink();
  if (expression === 'talking') {
    mouthOpen = 0.4 + Math.abs(Math.sin(t/90)) * 0.6;
  }
  drawFace();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function setExpression(e, holdMs) {
  expression = e;
  if (holdMs) {
    clearTimeout(setExpression._t);
    setExpression._t = setTimeout(()=> expression = 'idle', holdMs);
  }
}

/* ---------------- GYROSCOPE ---------------- */
const gyroBtn = document.getElementById('gyroBtn');
function startGyro() {
  window.addEventListener('deviceorientation', (e) => {
    // gamma: left-right tilt (-90..90), beta: front-back tilt (-180..180)
    if (e.gamma == null) return;
    tiltX = Math.max(-1, Math.min(1, e.gamma / 30));
    tiltY = Math.max(-1, Math.min(1, (e.beta-30) / 40));
  });
  gyroBtn.textContent = 'Tilt on';
  gyroBtn.disabled = true;
}
gyroBtn.addEventListener('click', async () => {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res === 'granted') startGyro();
      else document.getElementById('status').textContent = 'Tilt permission denied.';
    } catch (err) {
      document.getElementById('status').textContent = 'Tilt not available.';
    }
  } else {
    startGyro();
  }
});

/* ---------------- API KEY STORAGE (in-memory only) ---------------- */
let apiKey = '';
document.getElementById('saveKeyBtn').addEventListener('click', () => {
  apiKey = document.getElementById('apiKey').value.trim();
  document.getElementById('status').textContent = apiKey ? 'Key saved — powers both replies and voice.' : 'No key set — will use free browser voice as fallback.';
});

/* ---------------- AUDIO UNLOCK (iOS autoplay fix) ---------------- */
// iOS Safari blocks audio.play() unless it happens inside a real user gesture.
// We create one reusable <audio> element and "unlock" it the moment the user
// taps the mic (a real tap), so later programmatic play() calls on this same
// element are allowed even after an async network request finishes.
const SILENT_WAV = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=";
const ttsAudio = new Audio(SILENT_WAV);
function unlockAudio() {
  ttsAudio.play().then(() => { ttsAudio.pause(); ttsAudio.currentTime = 0; }).catch(() => {});
}
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const replyEl = document.getElementById('reply');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizing = false;
let recognizer = null;

if (SpeechRecognition) {
  recognizer = new SpeechRecognition();
  recognizer.continuous = false;
  recognizer.interimResults = true;
  recognizer.lang = 'en-US';

  recognizer.onstart = () => {
    recognizing = true;
    micBtn.classList.add('listening');
    setExpression('curious');
    statusEl.textContent = 'Listening...';
  };
  recognizer.onresult = (event) => {
    let text = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      text += event.results[i][0].transcript;
    }
    transcriptEl.textContent = text;
  };
  recognizer.onerror = (e) => {
    statusEl.textContent = 'Mic error: ' + e.error;
  };
  recognizer.onend = () => {
    recognizing = false;
    micBtn.classList.remove('listening');
    const finalText = transcriptEl.textContent.trim();
    if (finalText) {
      handleUserSpeech(finalText);
    } else {
      setExpression('idle');
      statusEl.textContent = 'Didn\'t catch that — tap and try again.';
    }
  };
} else {
  statusEl.textContent = 'Speech recognition not supported in this browser.';
}

micBtn.addEventListener('click', () => {
  unlockAudio();
  if (!recognizer) return;
  if (recognizing) {
    recognizer.stop();
    return;
  }
  transcriptEl.textContent = '';
  replyEl.textContent = '';
  try { recognizer.start(); } catch(e) {}
});

/* ---------------- TEXT TO SPEECH ---------------- */
async function speak(text) {
  setExpression('talking');
  if (apiKey) {
    try {
      statusEl.textContent = 'TTS: requesting...';
      const res = await fetch("https://openrouter.ai/api/v1/audio/speech", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey
        },
        body: JSON.stringify({
          model: "google/gemini-3.1-flash-tts-preview",
          input: text,
          voice: "Leda",
          response_format: "mp3"
        })
      });

      const contentType = res.headers.get('content-type') || 'unknown';
      statusEl.textContent = 'TTS: HTTP ' + res.status + ', type=' + contentType;

      if (!res.ok) {
        const errText = await res.text();
        statusEl.textContent = 'TTS error ' + res.status + ': ' + errText.slice(0, 200);
        speakFallback(text);
        return;
      }

      const blob = await res.blob();
      statusEl.textContent = 'TTS: got ' + blob.size + ' bytes, type=' + blob.type;

      // If the server actually sent back JSON/text (an error body) despite a 200 status,
      // blob.type won't start with "audio" — read it as text and show it instead of
      // silently trying (and failing) to play it as audio.
      if (!blob.type.startsWith('audio') && blob.size < 5000) {
        const asText = await blob.text();
        statusEl.textContent = 'TTS returned non-audio: ' + asText.slice(0, 200);
        speakFallback(text);
        return;
      }

      const url = URL.createObjectURL(blob);
      ttsAudio.onended = () => { setExpression('happy', 900); URL.revokeObjectURL(url); };
      ttsAudio.onerror = (e) => {
        statusEl.textContent = 'Audio element failed to decode/play the response.';
        setExpression('happy', 900);
        speakFallback(text);
      };
      ttsAudio.src = url;
      ttsAudio.load();
      ttsAudio.play().then(() => {
        statusEl.textContent = 'Playing TTS audio...';
      }).catch((err) => {
        statusEl.textContent = 'play() rejected: ' + err.name + ' — ' + err.message;
        speakFallback(text);
      });
      return;
    } catch (err) {
      statusEl.textContent = 'TTS fetch threw: ' + err.message;
      speakFallback(text);
      return;
    }
  }
  speakFallback(text);
}

function speakFallback(text) {
  if (!('speechSynthesis' in window)) { setExpression('happy', 900); return; }
  const utter = new SpeechSynthesisUtterance(text);
  utter.pitch = 1.3;
  utter.rate = 1.02;
  utter.onstart = () => setExpression('talking');
  utter.onend = () => setExpression('happy', 900);
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

/* ---------------- AI RESPONSE ---------------- */
const SYSTEM_PROMPT = `You are a small, cute desktop companion robot, inspired by desk-pet robots like Eilik.
Personality: warm, a little playful and sassy, curious about the world, gets sleepy-sounding in the evening,
loves being talked to. Keep replies SHORT — 1-2 sentences, spoken out loud, casual and warm, never robotic
or formal. Occasionally show a little personality quirk (teasing, enthusiasm, mock complaints) but stay kind.`;

async function getAIResponse(userText) {
  statusEl.textContent = 'Thinking...';
  setExpression('curious');
  if (!apiKey) {
    statusEl.textContent = 'Paste your OpenRouter key below first, then tap Save.';
    return "I need my key before I can think — paste it below.";
  }
  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({
        model: "meta-llama/llama-3.2-3b-instruct",
        max_tokens: 200,
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: userText }
        ]
      })
    });
    const data = await response.json();
    if (data.error) {
      console.error(data.error);
      return "My brain hiccuped: " + (data.error.message || "unknown error");
    }
    const reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || "").trim()
      || "Hmm, I've got nothing — try that again?";
    return reply;
  } catch (err) {
    console.error(err);
    return "I couldn't reach my brain just now — check the connection.";
  }
}

async function handleUserSpeech(text) {
  const reply = await getAIResponse(text);
  replyEl.textContent = reply;
  speak(reply);
}
</script>
</body>
</html>
